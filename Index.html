<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMG Session Planner</title>
<style>
  :root{
    --bg:#0f1729; --panel:#182338; --panel2:#1e2b45; --line:#2b3a58;
    --text:#e8eef8; --muted:#93a3c0; --accent:#4f9cf9; --accent2:#3b82f6;
    --green:#22c55e; --green-bg:#123023; --amber:#f59e0b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);padding:16px;max-width:820px;margin:0 auto}
  h1{font-size:22px;margin:4px 0 2px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}

  .add-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:20px}
  .add-card h2{font-size:14px;margin:0 0 12px;color:var(--muted);font-weight:600;
    text-transform:uppercase;letter-spacing:.5px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .field{flex:1;min-width:140px;display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .field label{font-size:12px;color:var(--muted)}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:11px 12px;font-size:15px;font-family:inherit;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .add-btn{background:var(--accent2);color:#fff;border:none;border-radius:9px;
    padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:4px}
  .add-btn:active{background:var(--accent)}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
  .tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .tab .count{opacity:.7;font-weight:400}

  .day-head{font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;
    letter-spacing:.6px;margin:16px 4px 8px}

  .item{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
  .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--muted);
    flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#fff;transition:all .15s}
  .check:active{transform:scale(.9)}
  .info{flex:1;min-width:0}
  .name{font-size:16px;font-weight:600}
  .meta{font-size:13px;color:var(--muted);margin-top:2px}
  .del{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;
    padding:4px 8px;flex-shrink:0}
  .del:active{color:#ff6b6b}

  .item.done{background:var(--green-bg);border-color:#1e5637}
  .item.done .check{background:var(--green);border-color:var(--green)}
  .item.done .name{text-decoration:line-through;color:var(--muted)}
  .item.done .meta{color:#5f8a6f}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
</style>
</head>
<body>
  <h1>📅 Session Planner</h1>
  <div class="sub">Add sessions, then tap the circle to mark complete.</div>

  <div class="add-card">
    <h2>+ New Session</h2>
    <div class="row">
      <div class="field">
        <label>Student</label>
        <input id="fName" placeholder="e.g. Hesham" />
      </div>
      <div class="field">
        <label>Date</label>
        <input id="fDate" type="date" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Time</label>
        <input id="fTime" type="time" />
      </div>
      <div class="field">
        <label>Topic / Note (optional)</label>
        <input id="fTopic" placeholder="e.g. Pulmonology qbank" />
      </div>
    </div>
    <button class="add-btn" onclick="addSession()">Add Session</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="upcoming" onclick="setTab('upcoming')">
      Upcoming <span class="count" id="cUp"></span>
    </div>
    <div class="tab" data-tab="done" onclick="setTab('done')">
      Completed <span class="count" id="cDone"></span>
    </div>
  </div>

  <div id="list"></div>

<script>
  var tab = 'upcoming';
  var STORE = 'tmg_planner_v1';
  var sessions = [];
  var nextId = 1;

  function save(){
    try{ localStorage.setItem(STORE, JSON.stringify({sessions:sessions, nextId:nextId})); }catch(e){}
  }
  function load(){
    try{
      var raw = localStorage.getItem(STORE);
      if(raw){
        var d = JSON.parse(raw);
        sessions = d.sessions || [];
        nextId = d.nextId || 1;
        return true;
      }
    }catch(e){}
    return false;
  }
  if(!load()){
    sessions = [
      {id:1, name:'Hesham',  date:'2026-07-06', time:'10:00', topic:'Pulmonology qbank', done:false},
      {id:2, name:'Nisha',   date:'2026-07-06', time:'14:00', topic:'Heme/Onc review',   done:false},
      {id:3, name:'Augusto', date:'2026-07-07', time:'09:30', topic:'NBME 7 mixed block', done:false},
      {id:4, name:'Aimee',   date:'2026-07-08', time:'16:00', topic:'CCS cases',          done:false},
      {id:5, name:'Omar',    date:'2026-07-03', time:'11:00', topic:'Biostatistics',      done:true},
    ];
    nextId = 6;
  }

  function setTab(t){
    tab = t;
    document.querySelectorAll('.tab').forEach(function(el){
      el.classList.toggle('active', el.dataset.tab===t);
    });
    render();
  }

  function addSession(){
    var name = document.getElementById('fName').value.trim();
    var date = document.getElementById('fDate').value;
    if(!name || !date){ alert('Please add a student name and a date.'); return; }
    sessions.push({
      id: nextId++,
      name: name,
      date: date,
      time: document.getElementById('fTime').value,
      topic: document.getElementById('fTopic').value.trim(),
      done: false
    });
    document.getElementById('fName').value='';
    document.getElementById('fDate').value='';
    document.getElementById('fTime').value='';
    document.getElementById('fTopic').value='';
    save();
    tab='upcoming'; setTab('upcoming');
  }

  function toggle(id){
    var s = sessions.find(function(x){return x.id===id});
    if(s) s.done = !s.done;
    save();
    render();
  }
  function del(id){
    if(!confirm('Delete this session?')) return;
    sessions = sessions.filter(function(x){return x.id!==id});
    save();
    render();
  }

  function fmtDate(d){
    var dt = new Date(d+'T00:00:00');
    return dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  }
  function fmtTime(t){
    if(!t) return '';
    var p=t.split(':'), h=+p[0], m=p[1], ap=h>=12?'PM':'AM';
    h=h%12||12; return h+':'+m+' '+ap;
  }

  function render(){
    var up = sessions.filter(function(s){return !s.done});
    var done = sessions.filter(function(s){return s.done});
    document.getElementById('cUp').textContent = up.length;
    document.getElementById('cDone').textContent = done.length;

    var show = tab==='upcoming' ? up : done;
    var list = document.getElementById('list');

    if(show.length===0){
      list.innerHTML = '<div class="empty">No '+(tab==='upcoming'?'upcoming':'completed')+' sessions yet.</div>';
      return;
    }

    show.sort(function(a,b){
      return (a.date+ (a.time||'')).localeCompare(b.date+(b.time||''));
    });

    var html='', lastDay='';
    show.forEach(function(s){
      if(s.date!==lastDay){
        html += '<div class="day-head">'+fmtDate(s.date)+'</div>';
        lastDay=s.date;
      }
      var meta = fmtTime(s.time);
      if(s.topic) meta += (meta?' · ':'')+s.topic;
      html += '<div class="item'+(s.done?' done':'')+'">'
        + '<div class="check" onclick="toggle('+s.id+')">'+(s.done?'✓':'')+'</div>'
        + '<div class="info"><div class="name">'+esc(s.name)+'</div>'
        + (meta?'<div class="meta">'+esc(meta)+'</div>':'')+'</div>'
        + '<button class="del" onclick="del('+s.id+')">✕</button>'
        + '</div>';
    });
    list.innerHTML = html;
  }
  function esc(s){return (s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}

  render();
</script>
</body>
</html>
